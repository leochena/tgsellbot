name: Bug report
description: Report a reproducible problem in TGSellBot.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not include bot tokens, private keys, passwords, or production customer data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the problem.
      placeholder: |
        1. Start the bot with ...
        2. Open ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "main, v1.0.0, or commit SHA"
  - type: dropdown
    id: deploy
    attributes:
      label: Deployment method
      options:
        - Docker Compose
        - Manual Python
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste only safe, redacted logs.
      render: shell
